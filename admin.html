<!DOCTYPE html>
<h2>Add Content</h2>

<select id="type">
  <option value="vip">VIP</option>
  <option value="video_games">Video Games</option>
  <option value="college">College</option>
</select>

<input id="title" placeholder="Title">
<input id="extra1" placeholder="Extra (time/platform/level)">
<input id="extra2" placeholder="Description (optional)">

<button onclick="addData()">Save</button>

<script>
function addData() {
  const type = document.getElementById("type").value;

  let data = {
    title: document.getElementById("title").value
  };

  if (type === "vip") {
    data.time = document.getElementById("extra1").value;
    data.description = document.getElementById("extra2").value;
  }

  if (type === "video_games") {
    data.platform = document.getElementById("extra1").value;
    data.status = document.getElementById("extra2").value;
  }

  if (type === "college") {
    data.level = document.getElementById("extra1").value;
    data.topic = document.getElementById("extra2").value;
  }

  db.collection(type).add(data);

  alert("Saved successfully!");
}
</script>
