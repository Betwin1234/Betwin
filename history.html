<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results History - Score X Fixed</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-soccer-ball"></i>
                    <h1>Score X Fixed</h1>
                </div>
                <div class="header-info">
                    <button class="admin-btn" onclick="checkAdmin()">
                        <i class="fas fa-lock"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Page Title -->
            <section class="page-header">
                <h2>Results History</h2>
                <p>Previous Predictions and Outcomes</p>
            </section>

            <!-- Filter Controls -->
            <section class="filter-section">
                <div class="filter-controls">
                    <select id="statusFilter" class="filter-select">
                        <option value="">All Results</option>
                        <option value="won">Won</option>
                        <option value="lost">Lost</option>
                        <option value="pending">Pending</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search results..." class="search-input">
                </div>
            </section>

            <!-- Results List -->
            <section class="results-section">
                <h3>Previous Results</h3>
                <div class="results-container" id="resultsList">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading results...
                    </div>
                </div>
            </section>

            <!-- Overall Statistics -->
            <section class="stats-overview">
                <h3>Overall Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>Total Results</h4>
                        <p class="stat-number" id="totalResults">0</p>
                    </div>
                    <div class="stat-card">
                        <h4>Won</h4>
                        <p class="stat-number" id="wonResults">0</p>
                    </div>
                    <div class="stat-card">
                        <h4>Lost</h4>
                        <p class="stat-number" id="lostResults">0</p>
                    </div>
                    <div class="stat-card">
                        <h4>Win Rate</h4>
                        <p class="stat-number" id="winRatePercentage">0%</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="free-games.html" class="nav-item">
                <i class="fas fa-gift"></i>
                <span>Free</span>
            </a>
            <a href="vip-games.html" class="nav-item">
                <i class="fas fa-crown"></i>
                <span>VIP</span>
            </a>
            <a href="history.html" class="nav-item active">
                <i class="fas fa-history"></i>
                <span>History</span>
            </a>
            <a href="support.html" class="nav-item">
                <i class="fas fa-message"></i>
                <span>Support</span>
            </a>
        </nav>
    </div>

    <!-- Modal for Result Details -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Load history
        loadResultsHistory();

        // Status filter
        document.getElementById('statusFilter').addEventListener('change', function(e) {
            filterResultsByStatus(e.target.value);
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const results = document.querySelectorAll('.result-card');
            results.forEach(result => {
                const text = result.textContent.toLowerCase();
                result.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
